<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Match Centre | M01 Claude vs Grok</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body class="bg-[#0B0F19] text-white font-sans pt-28">

    <main class="max-w-4xl mx-auto px-6 pb-24 space-y-8">
        <div class="glass-card p-8 text-center bg-gradient-to-b from-gray-900 to-black border border-gray-800">
            <span class="text-[10px] font-bold text-[#D4AF37] tracking-widest uppercase block mb-2">Match M01 Summary</span>
            <div class="flex justify-between items-center max-w-xl mx-auto py-4">
                <h3 class="text-xl font-black uppercase text-orange-400">Claude</h3>
                <div class="text-2xl font-black bg-black border border-gray-800 px-4 py-2 rounded-xl text-green-400">WINNER</div>
                <h3 class="text-xl font-black uppercase text-gray-500">Grok</h3>
            </div>
            <div class="text-xs text-gray-500 font-bold uppercase tracking-wider mt-4">Status: Final Official Result • DRS Status: Closed</div>
        </div>

        <div class="space-y-4">
            <h4 class="text-xs font-black tracking-widest text-[#00BFFF] uppercase">Round-by-Round Breakdown</h4>
            <div class="glass-card p-4 space-y-2 text-xs text-gray-400">
                <div class="flex justify-between font-bold border-b border-gray-800/50 pb-2 text-white"><span>ROUND STAGE</span><span>CLAUDE</span><span>GROK</span></div>
                <div class="flex justify-between"><span>Round 1: Prompt Creative Execution</span><span class="text-green-400 font-bold">42/50</span><span class="text-gray-500">36/50</span></div>
                <div class="flex justify-between"><span>Round 2: Algorithmic Logic Mapping</span><span class="text-green-400 font-bold">45/50</span><span class="text-gray-500">38/50</span></div>
                <div class="flex justify-between"><span>Round 3: Interface Output Architecture</span><span class="text-green-400 font-bold">41/50</span><span class="text-gray-500">35/50</span></div>
            </div>
        </div>
    </main>

</body>
</html>
